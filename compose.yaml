version: "3.9"

services:

  laravel:
    build: ./task-management
    container_name: laravel_app
    working_dir: /var/www/html
    volumes:
      - ./task-management:/var/www/html
    ports:
      - "8000:8000"
      - "5173:5173"
    depends_on:
      - mysql
      - python-api
    networks:
      - app-network

  mysql:
    image: mysql:8.4
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: naivebayes
      MYSQL_USER: root
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

  python-api:
    build: ./task-management-api
    container_name: naive_bayes_api
    volumes:
      - ./task-management-api:/app
    ports:
      - "8001:8000"
    networks:
      - app-network

networks:
  app-network:

volumes:
  mysql-data: